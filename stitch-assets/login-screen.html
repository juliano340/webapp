<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BarberManager - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between whitespace-nowrap border-b border-slate-200 dark:border-slate-800 px-6 py-4 lg:px-10">
<div class="flex items-center gap-3">
<div class="flex items-center justify-center bg-primary rounded-lg p-2 text-white">
<span class="material-symbols-outlined !text-2xl">content_cut</span>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold tracking-tight">BarberManager</h2>
</div>
</header>
<main class="flex-1 flex items-center justify-center p-6">
<div class="w-full max-w-[440px] flex flex-col gap-8">
<div class="flex flex-col gap-2">
<h1 class="text-slate-900 dark:text-white text-4xl font-black tracking-tight">Bem-vindo</h1>
<p class="text-slate-500 dark:text-slate-400 text-lg">Acesse sua conta para gerenciar sua barbearia</p>
</div>
<div class="w-full aspect-video rounded-xl overflow-hidden mb-2">
<div class="w-full h-full bg-slate-200 dark:bg-slate-800 flex items-center justify-center bg-cover bg-center" data-alt="Interior moderno e minimalista de uma barbearia profissional" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCDy3OHJAbt-xQh9Zqx1S5qr4ZaBAyyY5KDcAp5JuGlEo4Zth2stcSPaqYcGVI-XlxaB3LfyCQccUVc2lrZ-EWyK58pcYdSSJ95fyHYQ2PtZzWDE3QNn8L0T7d-RldG5QOXkauieYWUApv6B9LNUr8UmYicD_oVlLQQRGaXcdOM8aSrOj0hkPnkTKMhKJ1Y14pJXY2im-CFN2A3LjNW4Ame5XELQqJaO0MHppKVxq_rlChHWaYTH5Y7p93UpRsevw2eKhE6wmckMA');">
</div>
</div>
<form class="flex flex-col gap-5">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold uppercase tracking-wider">E-mail</label>
<input class="w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent h-14 px-4 text-base transition-all" placeholder="seuemail@exemplo.com" type="email"/>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold uppercase tracking-wider">Senha</label>
<a class="text-primary text-sm font-medium hover:underline" href="#">Esqueceu a senha?</a>
</div>
<div class="relative group">
<input class="w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent h-14 px-4 pr-12 text-base transition-all" placeholder="Digite sua senha" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<button class="mt-4 w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold text-lg rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group" type="submit">
                            Entrar
                            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<div class="pt-4 border-t border-slate-200 dark:border-slate-800 flex justify-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                            Não tem uma conta? <a class="text-primary font-bold hover:underline" href="#">Solicite acesso</a>
</p>
</div>
</div>
</main>
<footer class="p-6 text-center text-slate-400 dark:text-slate-600 text-xs">
                © 2024 BarberManager Professional System. Todos os direitos reservados.
            </footer>
</div>
</div>
</body></html>
